name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'


      - name: Give permission to mvnw
        run: chmod +x mvnw
        
      - name: Build with Maven
        run: ./mvnw clean install

      - name: Run Tests
        run: ./mvnw test